name: catalog-ingester

on:
  push:
    branches: [main]
    paths:
      - "catalog-ingester/**"
      - "compose.yml"
  pull_request:
    branches: [main]
    paths:
      - "catalog-ingester/**"
      - "compose.yml"

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  SERVICE_NAME: catalog-ingester

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: ${{ env.SERVICE_NAME }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Test Go code
        run: cd ${{ env.SERVICE_NAME }} && go test -v ./... -coverprofile=cover.out

      - name: check test coverage
        uses: vladopajic/go-test-coverage@v2
        continue-on-error: true
        with:
          config: ./.testcoverage.yml

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.SERVICE_NAME }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:latest
