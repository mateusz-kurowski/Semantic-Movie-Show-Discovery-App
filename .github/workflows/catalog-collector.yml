name: catalog-collector

on:
  push:
    branches: [main]
    paths:
      - "catalog-collector/**"
      - ".github/workflows/catalog-collector.yml"
  pull_request:
    branches: [main]
    paths:
      - "catalog-collector/**"
      - ".github/workflows/catalog-collector.yml"

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  SERVICE_NAME: catalog-collector
  TRIVY_VULN_TYPE: 'os,library'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          src: ${{ env.SERVICE_NAME }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.SERVICE_NAME }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:latest

      - name: Run Trivy (CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: ${{ env.TRIVY_VULN_TYPE }}
          severity: 'CRITICAL'

      - name: Run Trivy (HIGH)
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          image-ref: 'docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: ${{ env.TRIVY_VULN_TYPE }}
          severity: 'HIGH'