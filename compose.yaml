services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.91.0
    environment:
      - ZO_DATA_DIR=/data
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_ROOT_PASSWORD}
      - ZO_ROOT_USER_EMAIL=${OPENOBSERVE_ROOT_EMAIL}
    ports:
      - 5080:5080
    volumes:
      - openobserve_data:/data

  fluent_bit:
    image: cr.fluentbit.io/fluent/fluent-bit
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.yaml"]
    depends_on:
      - openobserve
    environment:
      - OPENOBSERVE_ROOT_EMAIL=${OPENOBSERVE_ROOT_EMAIL}
      - OPENOBSERVE_ROOT_PASSWORD=${OPENOBSERVE_ROOT_PASSWORD}
    volumes:
      - ./fluent-bit/fluent-bit.yaml:/fluent-bit/etc/fluent-bit.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  db:
    image: postgres
    restart: always
    shm_size: 512mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  catalog-collector:
    build:
      context: catalog-collector
      dockerfile: Dockerfile
    restart: on-failure
    pull_policy: never
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Defaults if not provided in .env
      - OTEL_SERVICE_NAME=catalog-collector
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local
      - OTEL_EXPORTER_OTLP_INSECURE=false
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_PYTHON_LOG_CORRELATION=true

