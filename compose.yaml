services:
  catalog-collector:
    build:
      context: catalog-collector
      dockerfile: Dockerfile
    restart: on-failure
    pull_policy: never
    env_file:
      - .env
    environment:
      # Defaults if not provided in .env
      - OTEL_SERVICE_NAME=catalog-collector
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local
      - OTEL_EXPORTER_OTLP_INSECURE=false
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_PYTHON_LOG_CORRELATION=true

  catalog-ingester:
    build:
      context: catalog-ingester
      dockerfile: Dockerfile
    restart: unless-stopped
    pull_policy: never
    env_file:
      - .env
    environment:
      # Defaults if not provided in .env
      - OTEL_SERVICE_NAME=catalog-ingester
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local
      - OTEL_EXPORTER_OTLP_INSECURE=false
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - EMBEDDING_MODEL_ENDPOINT=http://text-embeddings-inference:80/embed
    depends_on:
      text-embeddings-inference:
        condition: service_started
        required: false # This allows running without local inference if using cloud Qdrant inference

  text-embeddings-inference:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9.3
    ports:
      - "${TEXT_EMBEDDINGS_PORT:-38080}:80"
    volumes:
      - hf_cache:/data
    pull_policy: always
    restart: unless-stopped
    profiles: ["local-inference"]
    command: >
      --model-id intfloat/multilingual-e5-small
      --pooling mean 
      --max-batch-tokens 16384 
      --max-client-batch-size 8
      --auto-truncate

volumes:
  hf_cache:
    external: true
    name: hf_cache
