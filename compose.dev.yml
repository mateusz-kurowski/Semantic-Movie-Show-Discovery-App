services:
  catalog-collector:
    build:
      context: catalog-collector
      dockerfile: Dockerfile
    env_file:
      - catalog-collector/.env.development
  catalog-ingester:
    build:
      context: catalog-ingester
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - text-embeddings-inference
    env_file:
      - catalog-ingester/.env.development
  text-embeddings-inference:
    ports:
      - 8080:80
    volumes:
      - hf_cache:/data
    pull_policy: always
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9.1
    command:
      --model-id Qwen/Qwen3-Embedding-0.6B --revision refs/pr/27 --pooling
      mean --max-batch-tokens 2048 --max-client-batch-size 16
      --auto-truncate
volumes:
  hf_cache:
    external: true
    name: hf_cache
