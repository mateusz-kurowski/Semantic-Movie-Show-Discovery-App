sonar.projectKey=Semantic-Movie-Show-Discovery-App
sonar.projectName=Semantic-Movie-Show-Discovery-App
sonar.sourceEncoding=UTF-8

# === Sources (all services) ===
sonar.sources=catalog-api/src,catalog-collector/src,catalog-ingester,frontend/src

# === Test directories ===
sonar.tests=catalog-collector/src/tests,catalog-ingester,catalog-api/src,frontend/src

# === Test file patterns per language ===
sonar.test.inclusions=\
  **/*_test.go,\
  **/test_*.py,\
  **/*.test.ts,**/*.test.tsx,\
  **/*.spec.ts,**/*.spec.tsx

# === Global exclusions ===
sonar.exclusions=\
  **/vendor/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.pytest_cache/**,\
  **/dataset/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.lock,\
  **/cover.out

# === Go ===
sonar.go.coverage.reportPaths=catalog-ingester/cover.out

# === Python ===
sonar.python.version=3.14
# Uncomment when you set up Python coverage:
# sonar.python.coverage.reportPaths=catalog-collector/coverage.xml

# === TypeScript / JavaScript ===
# Uncomment when you set up test coverage reporting:
# sonar.typescript.lcov.reportPaths=catalog-api/coverage/lcov.info,frontend/coverage/lcov.info
# sonar.javascript.lcov.reportPaths=catalog-api/coverage/lcov.info,frontend/coverage/lcov.info
